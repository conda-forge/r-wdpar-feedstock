{% set version = "1.3.9" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-wdpar
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/wdpar_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/wdpar/wdpar_{{ version }}.tar.gz
  sha256: d2e4dd48c1a764361f70a39b0d1716a258c547adf30c6770d4e7ace3911f9a48

build:
  noarch: generic
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

  host:
    - r-base
    - r-archive >=1.1.10
    - r-assertthat >=0.2.0
    - r-chromote >=0.2.0
    - r-cli >=1.0.1
    - r-countrycode >=1.1.0
    - r-curl >=3.2
    - r-httr >=1.3.1
    - r-lwgeom >=0.2_1
    - r-pingr >=1.1.2
    - r-progress >=1.2.0
    - r-rappdirs >=0.3.1
    - r-sf >=1.0_13
    - r-tibble >=2.1.3
    - r-withr >=3.0.0
    - r-xml2 >=1.2.0
  run:
    - r-base
    - r-archive >=1.1.10
    - r-assertthat >=0.2.0
    - r-chromote >=0.2.0
    - r-cli >=1.0.1
    - r-countrycode >=1.1.0
    - r-curl >=3.2
    - r-httr >=1.3.1
    - r-lwgeom >=0.2_1
    - r-pingr >=1.1.2
    - r-progress >=1.2.0
    - r-rappdirs >=0.3.1
    - r-sf >=1.0_13
    - r-tibble >=2.1.3
    - r-withr >=3.0.0
    - r-xml2 >=1.2.0

test:
  commands:
    - $R -e "library('wdpar')"           # [not win]
    - "\"%R%\" -e \"library('wdpar')\""  # [win]

about:
  home: https://prioritizr.github.io/wdpar/
  dev_url: https://github.com/prioritizr/wdpar
  license: GPL-3.0-only
  summary: Fetch and clean data from the World Database on Protected Areas (WDPA) and the World
    Database on Other Effective Area-Based Conservation Measures (WDOECM). Data is obtained
    from Protected Planet <https://www.protectedplanet.net/en>. To augment data cleaning
    procedures, users can install the 'prepr' R package (available at <https://github.com/prioritizr/prepr>).
    For more information on this package, see Hanson (2022) <doi:10.21105/joss.04594>.
  license_family: GPL3
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3

extra:
  recipe-maintainers:
    - conda-forge/r
    - ocefpaf
